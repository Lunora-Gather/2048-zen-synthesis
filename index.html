<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="2048 is a browser puzzle game with keyboard controls, touch swipes, undo, score records, multiple board sizes, themes, sound effects, achievements, and responsive layout.">
    <meta name="keywords" content="2048, browser game, puzzle game, GitHub Pages, JavaScript game">
    <meta name="theme-color" content="#0a0c14">
    <meta name="color-scheme" content="light dark">
    <meta property="og:title" content="2048">
    <meta property="og:description" content="Play 2048 directly in the browser.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lunora-gather.github.io/2048/">
    <meta property="og:site_name" content="2048">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="2048">
    <meta name="twitter:description" content="Play 2048 directly in the browser.">
    <link rel="canonical" href="https://lunora-gather.github.io/2048/">
    <title>2048</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=32">
    <link rel="stylesheet" href="optimizations.css?v=10">
</head>
<body>
    <noscript>
        <div class="noscript-message">
            <strong>2048 needs JavaScript to run.</strong>
            <span>Please enable JavaScript and reload the page.</span>
        </div>
    </noscript>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <div class="zen-wrapper">
        <!-- Main game area -->
        <div class="zen-container">
            <!-- Header controls -->
            <header class="zen-header">
                <div class="brand">
                    <h1 class="logo">2048</h1>
                    <span class="badge">WJH</span>
                </div>
                
                <div class="header-controls">
                    <button id="btn-theme-toggle" class="theme-toggle-btn" title="Toggle display mode" aria-label="Toggle display mode">
                        <div class="toggle-track">
                            <div class="toggle-thumb">
                                <i class="fa-solid fa-moon dark-icon"></i>
                                <i class="fa-solid fa-sun light-icon"></i>
                            </div>
                        </div>
                    </button>

                    <button id="btn-sound-toggle" class="icon-btn" title="Toggle sound" aria-label="Toggle sound">
                        <i class="fa-solid fa-volume-xmark"></i>
                    </button>

                    <button id="btn-achievements-trigger" class="icon-btn" title="Open achievements and activity" aria-label="Open achievements and activity">
                        <i class="fa-solid fa-award"></i>
                    </button>
                </div>
            </header>

            <section class="display-deck" aria-label="Score and settings">
                <div class="score-container">
                    <div class="score-card current">
                        <span class="label">SCORE</span>
                        <span id="current-score" class="value">0</span>
                        <div id="score-addition-container" class="score-addition-container"></div>
                    </div>
                    <div class="score-card best">
                        <span class="label">BEST</span>
                        <span id="best-score" class="value">0</span>
                    </div>
                </div>

                <div class="quick-settings">
                    <div class="select-pill">
                        <select id="grid-size" aria-label="Select board size">
                            <option value="4" selected>4 × 4</option>
                            <option value="5">5 × 5</option>
                            <option value="6">6 × 6</option>
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                    </div>

                    <div class="select-pill">
                        <select id="theme-select" aria-label="Select visual theme">
                            <option value="cyberpunk" selected>Purple</option>
                            <option value="classic">Classic</option>
                            <option value="pastel">Fresh</option>
                            <option value="monochrome">Minimal</option>
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                    </div>

                    <div class="select-pill">
                        <select id="synth-select" aria-label="Select sound preset">
                            <option value="zen" selected>Default Sound</option>
                            <option value="cyber">Electronic</option>
                            <option value="retro">Retro</option>
                            <option value="mech">Mechanical</option>
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                    </div>
                </div>
            </section>

            <main class="board-deck" aria-label="2048 board">
                <div class="board-frame">
                    <div id="board" class="matrix-board size-4" role="grid" aria-label="2048 grid">
                        <!-- Grid is generated dynamically -->
                    </div>
                    <div id="tiles-container" class="tiles-container"></div>

                    <div id="game-over-overlay" class="overlay hidden">
                        <div class="overlay-content">
                            <i class="fa-solid fa-circle-exclamation status-icon warning"></i>
                            <h2>No Moves Left</h2>
                            <p>The board is full and no more tiles can be merged.</p>
                            <button id="btn-retry" class="btn btn-primary">Restart</button>
                        </div>
                    </div>

                    <div id="game-win-overlay" class="overlay hidden">
                        <div class="overlay-content win">
                            <i class="fa-solid fa-circle-check status-icon success"></i>
                            <h2>2048 Reached!</h2>
                            <p>You made a 2048 tile. Keep going for a higher score?</p>
                            <div class="button-row">
                                <button id="btn-keep-going" class="btn btn-secondary">Keep Going</button>
                                <button id="btn-win-restart" class="btn btn-primary">New Game</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <section class="stats-deck" aria-label="Game statistics">
                <div class="stat-pill">
                    <span class="label"><i class="fa-regular fa-clock"></i> TIME</span>
                    <span id="stat-time" class="value">00:00</span>
                </div>
                <div class="stat-pill">
                    <span class="label"><i class="fa-solid fa-code-merge"></i> MOVES</span>
                    <span id="stat-moves" class="value">0</span>
                </div>
                <div class="stat-pill">
                    <span class="label"><i class="fa-solid fa-bolt"></i> MAX TILE</span>
                    <span id="stat-max-tile" class="value">0</span>
                </div>
            </section>

            <div class="action-deck">
                <button id="btn-restart" class="btn btn-secondary flex-1">
                    <i class="fa-solid fa-rotate-right"></i> Restart Grid
                </button>
                <button id="btn-undo" class="btn btn-secondary flex-1" disabled>
                    <i class="fa-solid fa-arrow-rotate-left"></i> Undo Step
                </button>
            </div>
        </div>

        <div id="drawer-panel" class="drawer" aria-label="Game information">
            <div class="drawer-header">
                <h3><i class="fa-solid fa-award"></i> Game Info</h3>
                <button id="btn-drawer-close" class="close-btn" aria-label="Close achievements and activity"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="drawer-content">
                <div class="drawer-section achievements-section">
                    <h4 class="subtitle">ACHIEVEMENTS</h4>
                    <div class="milestones-grid">
                        <div id="achieve-first" class="milestone-card locked">
                            <i class="fa-solid fa-square-plus"></i>
                            <span class="name">First Merge</span>
                        </div>
                        <div id="achieve-64" class="milestone-card locked">
                            <i class="fa-solid fa-heart"></i>
                            <span class="name">Reach 64</span>
                        </div>
                        <div id="achieve-512" class="milestone-card locked">
                            <i class="fa-solid fa-compass"></i>
                            <span class="name">Reach 512</span>
                        </div>
                        <div id="achieve-2048" class="milestone-card locked">
                            <i class="fa-solid fa-crown"></i>
                            <span class="name">Reach 2048</span>
                        </div>
                    </div>
                </div>

                <div class="drawer-section log-section">
                    <h4 class="subtitle">ACTIVITY</h4>
                    <div id="synthesis-ledger" class="console-box">
                        <div class="console-line init">[SYSTEM] Game ready.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="drawer-backdrop" class="drawer-backdrop"></div>

    <script src="script.js?v=32"></script>
    <script src="optimizations.js?v=5"></script>
</body>
</html>
